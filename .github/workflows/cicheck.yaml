on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read
jobs:
  ci-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Download dependencies
        run: go mod download

      - name: Lint
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
